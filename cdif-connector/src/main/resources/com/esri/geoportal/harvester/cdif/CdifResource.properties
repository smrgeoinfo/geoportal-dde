# CDIF Sitemap Connector - UI labels for the harvester web interface

cdif.connector.label=CDIF Sitemap (JSON-LD)

cdif.sitemap.url.label=Sitemap URL
cdif.sitemap.url.hint=URL of the sitemap.xml containing JSON-LD record locations (e.g. https://example.org/sitemap.xml)

cdif.xslt.path.label=XSLT Path (optional)
cdif.xslt.path.hint=Path to CDIF-to-ISO 19115-3 XSLT. Default: xslt/fromJsonCdif.xsl

cdif.recordid.path.label=Record ID Path (optional)
cdif.recordid.path.hint=JSON path to extract record identifier. Default: /@id
